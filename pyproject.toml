[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.4"]
build-backend = "scikit_build_core.build"

[project]
name = "pydecklink"
version = "0.2.4"
description = "Python bindings for Blackmagic DeckLink SDK"
license = "MIT"
requires-python = ">=3.12"
dependencies = ["numpy>=1.26"]

[project.optional-dependencies]
test = ["pytest>=8", "psutil>=5.9"]
cuda-examples = ["cuda-python>=12"]

[dependency-groups]
dev = ["pytest>=8", "mypy>=1.13", "psutil>=5.9"]

[tool.pytest.ini_options]
markers = [
    "hardware: requires DeckLink hardware (deselected by default)",
]
addopts = "-m 'not hardware'"

[tool.ruff]
target-version = "py312"
src = ["src", "tests"]
# Exclude nanobind-generated stub from formatting — content is machine-generated.
extend-exclude = ["src/pydecklink/_bindings.pyi"]

[tool.ruff.lint.per-file-ignores]
# Generated by nanobind stubgen — line length and import order are not ours to fix.
"src/pydecklink/_bindings.pyi" = ["E501", "I001"]

[tool.ruff.lint]
select = [
    "F",     # pyflakes
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
files = ["src/pydecklink"]

[[tool.mypy.overrides]]
module = "pydecklink._bindings"
ignore_missing_imports = true
# Generated by nanobind stubgen — contains bare Callable.
disable_error_code = ["no-untyped-def", "type-arg"]

[tool.scikit-build]
minimum-version = "0.10"
build-dir = "build/{wheel_tag}"
wheel.py-api = "cp312"
wheel.packages = ["src/pydecklink"]
cmake.build-type = "Release"

[tool.scikit-build.cmake.define]
DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Linux/include"}

[[tool.scikit-build.overrides]]
if.platform-system = "win32"
cmake.define.DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Win/include"}

[[tool.scikit-build.overrides]]
if.platform-system = "darwin"
cmake.define.DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Mac/include"}
