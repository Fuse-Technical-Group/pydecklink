[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.4", "setuptools-scm>=8"]
build-backend = "scikit_build_core.build"

[project]
name = "pydecklink"
dynamic = ["version"]
description = "Python bindings for Blackmagic DeckLink SDK"
license = "BSD-3-Clause"
requires-python = ">=3.12"
dependencies = ["numpy>=1.26"]

[project.optional-dependencies]
test = ["pytest>=8", "psutil>=5.9"]
cuda-examples = ["cuda-python>=12"]

[dependency-groups]
dev = ["pytest>=8", "mypy>=1.13", "psutil>=5.9"]

[tool.pytest.ini_options]
markers = [
    "hardware: requires DeckLink hardware (deselected by default)",
]
addopts = "-m 'not hardware'"

[tool.ruff]
target-version = "py312"
src = ["src", "tests"]
# Exclude nanobind-generated stub from formatting — content is machine-generated.
extend-exclude = ["src/pydecklink/_bindings.pyi"]

[tool.ruff.lint.per-file-ignores]
# Generated by nanobind stubgen — line length and import order are not ours to fix.
"src/pydecklink/_bindings.pyi" = ["E501", "I001"]

[tool.ruff.lint]
select = [
    "F",     # pyflakes
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
files = ["src/pydecklink"]

[[tool.mypy.overrides]]
module = "pydecklink._bindings"
ignore_missing_imports = true
# Generated by nanobind stubgen — contains bare Callable.
disable_error_code = ["no-untyped-def", "type-arg"]

[tool.scikit-build]
minimum-version = "0.10"
build-dir = "build/{wheel_tag}"
wheel.py-api = "cp312"
wheel.packages = ["src/pydecklink"]
cmake.build-type = "Release"
# Version is derived from the git tag (created by flywheel) via
# setuptools_scm rather than a static field — see [tool.setuptools_scm].
metadata.version.provider = "scikit_build_core.metadata.setuptools_scm"

[tool.scikit-build.cmake.define]
DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Linux/include"}

[[tool.scikit-build.overrides]]
if.platform-system = "win32"
cmake.define.DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Win/include"}

[[tool.scikit-build.overrides]]
if.platform-system = "darwin"
cmake.define.DECKLINK_SDK_DIR = {env = "DECKLINK_SDK_DIR", default = "vendor/Blackmagic DeckLink SDK 15.3/Mac/include"}

[tool.setuptools_scm]
# Version comes from git tags (e.g. v0.3.0 -> 0.3.0). The release tag is
# created by flywheel; the build must run against it with full history and
# tags present (build-wheels.yml checks out with fetch-depth: 0).

[tool.cibuildwheel]
# Used by the Linux leg of build-wheels.yml to produce manylinux wheels
# (cibuildwheel runs auditwheel repair, rewriting the linux_x86_64 tag PyPI
# rejects). macOS/Windows still build via `uv build`. Build only the cp312
# stable-ABI (abi3) wheel — nanobind STABLE_ABI + wheel.py-api = "cp312" make
# one build cover 3.12+. The container has no git, so build-wheels.yml passes
# the host-derived version via SETUPTOOLS_SCM_PRETEND_VERSION_FOR_PYDECKLINK.
build = "cp312-*"
# Blackmagic ships the DeckLink driver (libDeckLinkAPI.so) only for glibc, so a
# musllinux wheel would install on Alpine but never dlopen the driver. Build
# manylinux only.
skip = "*-musllinux*"
build-frontend = "build[uv]"
