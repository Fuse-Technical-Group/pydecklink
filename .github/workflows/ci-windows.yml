name: ci-windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build and import test
        run: |
          uv sync
          uv run python -c "import pydecklink; print('import OK')"

      - name: Stub freshness
        run: |
          $committed = "src\pydecklink\_bindings.pyi"
          $generated = Get-ChildItem -Path ".venv\Lib\site-packages\pydecklink\_bindings.pyi" -ErrorAction Stop
          $diff = Compare-Object (Get-Content $committed) (Get-Content $generated)
          if ($diff) {
            Write-Error "Committed stub is stale. Run 'uv sync' and copy the generated _bindings.pyi into src/pydecklink/."
            exit 1
          }

      - name: Mypy
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest tests/ -x --tb=short --noconftest
