name: publish

# Publishes wheels to PyPI via Trusted Publishing (OIDC) — no API tokens.
#
# Trigger: runs after a successful build-wheels run. build-wheels promotes the
# draft release using GITHUB_TOKEN, and token-driven events do not start new
# workflow runs, so listening on `release: published` would never fire. The
# workflow_run trigger fires regardless of token and exposes the run id whose
# wheel-* artifacts we publish. workflow_run always executes the copy of this
# file on the default branch, so changes here take effect only once merged.
on:
  workflow_run:
    workflows: ["build-wheels"]
    types: [completed]

permissions: {}

jobs:
  pypi:
    # Only after a green build-wheels triggered by a tag push. build-wheels
    # runs on `push: tags v*` and `workflow_dispatch`; gating on event == push
    # excludes manual artifact-only runs, and build-wheels has no other push
    # trigger, so every push-triggered run is a release tag.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pydecklink
    permissions:
      id-token: write  # mint the OIDC token PyPI Trusted Publishing verifies
      actions: read    # read artifacts from the triggering build-wheels run
    steps:
      - name: Download wheels from build-wheels run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
