name: lint-docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docs:
              - '*.md'
      - if: steps.changes.outputs.docs == 'true'
        uses: astral-sh/setup-uv@v5
      - if: steps.changes.outputs.docs == 'true'
        run: uv tool run pymarkdownlnt scan SPEC.md ROADMAP.md CHANGELOG.md
