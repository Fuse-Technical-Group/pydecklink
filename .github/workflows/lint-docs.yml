name: lint-docs

on:
  push:
    branches: [main]
    paths: ["*.md"]
  pull_request:
    paths: ["*.md"]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run pymarkdownlnt scan SPEC.md ROADMAP.md CHANGELOG.md
