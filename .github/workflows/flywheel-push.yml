name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per SPEC §10 (no floating tags). Bump via Dependabot;
      # the trailing # vX.Y.Z comment is mandatory for human review.
      # v2 invokes the composite action directly — the @<ref> resolves the
      # dispatcher, bundled scripts, and semantic-release plugins together, so
      # the v1 flywheel-version input is gone. v2.0.1 is the floor: its #229
      # fix lets external adopters resolve the composite (v2.0.0 cannot).
      - uses: point-source/flywheel@4c8d37b9bb19461681757e1363ce8f0dee041e01 # v2.0.1
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
