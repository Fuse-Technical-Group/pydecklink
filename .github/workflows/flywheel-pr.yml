name: Flywheel — PR
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
concurrency:
  group: flywheel-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  conduct:
    # Skip drafts; ignore `edited` events from bots (only a human editing the
    # title/body should retrigger the conventional-commit rewrite).
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action != 'edited' || github.event.sender.type == 'User')
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per SPEC §10 (no floating tags). Bump via Dependabot;
      # the trailing # vX.Y.Z comment is mandatory for human review.
      # v2 invokes the composite action directly — the @<ref> resolves the
      # dispatcher, bundled scripts, and semantic-release plugins together, so
      # the v1 flywheel-version input is gone. v2.0.1 is the floor: its #229
      # fix lets external adopters resolve the composite (v2.0.0 cannot).
      - uses: point-source/flywheel@59758d1940ebe054ce9fdd4b7a7dc79a0cf235e0 # v2.1.0
        with:
          event: pull_request
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
