name: build-wheels

# Triggered by the release tag flywheel pushes (release_as_draft on main
# leaves the GitHub Release as a draft). This job attaches every platform's
# wheel to that draft; the publish job promotes it to a published (immutable)
# release only after all platforms succeed. workflow_dispatch is kept for
# manual artifact builds / re-uploads to an existing tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to upload wheels to (e.g. v0.2.0). Leave blank to only produce artifacts."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so setuptools_scm can derive the version
          # from the release tag (pyproject [project] dynamic = version).
          fetch-depth: 0

      # Linux builds inside the manylinux container (cibuildwheel), which
      # provides its own toolchain — no host apt deps. macOS/Windows build on
      # the host and still need cmake/ninja and MSVC respectively.
      - name: Install system deps (macOS)
        if: matrix.platform == 'macos'
        run: brew install cmake ninja

      - name: Install system deps (Windows)
        if: matrix.platform == 'windows'
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: x64

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      # setuptools_scm reads the version from git, but the manylinux container
      # has no git history. Derive it on the host (full history via
      # fetch-depth: 0) and hand it to cibuildwheel below.
      - name: Derive version from git (Linux)
        id: version
        if: matrix.platform == 'linux'
        run: |
          version=$(uv run --no-project --with setuptools-scm \
            python -c 'from setuptools_scm import get_version; print(get_version())')
          echo "value=$version" >> "$GITHUB_OUTPUT"

      # auditwheel repair (run automatically by cibuildwheel) rewrites the
      # linux_x86_64 platform tag to manylinux so PyPI accepts the wheel.
      - name: Build manylinux wheel (Linux)
        if: matrix.platform == 'linux'
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        with:
          output-dir: dist
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_PYDECKLINK=${{ steps.version.outputs.value }}

      - name: Build wheel (macOS/Windows)
        if: matrix.platform != 'linux'
        run: uv build --wheel

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

      # Attach to the draft release for this tag. The draft is still mutable,
      # so assets can be added here; the immutability freeze happens at the
      # publish step below, with every platform's wheel present.
      - name: Upload wheel to release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
        # Force bash: on the Windows runner the default shell is PowerShell,
        # which cannot parse the ${INPUT_TAG:-...} expansion or glob dist/*.whl.
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          TAG="${INPUT_TAG:-${{ github.ref_name }}}"
          gh release upload "$TAG" dist/*.whl --clobber

  # Promote the draft to a published (immutable) release only after every
  # platform's wheel has uploaded. fail-fast: false means one failed platform
  # fails `build`, this job is skipped, and the release stays a draft for
  # remediation rather than shipping incomplete. Tag-push only; manual
  # workflow_dispatch runs never auto-publish.
  publish:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ github.token }}
        # This job has no checkout, so gh cannot infer the repo from git
        # context (it errors "not a git repository"). Pass it explicitly.
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
