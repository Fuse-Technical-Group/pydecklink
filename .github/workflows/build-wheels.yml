name: build-wheels

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  AJANTV2_TAG: ntv2_17_5_0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build libudev-dev pkg-config

      - name: Install system deps (macOS)
        if: matrix.platform == 'macos'
        run: brew install cmake ninja

      - name: Install system deps (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build libajantv2 (Unix)
        if: matrix.platform != 'windows'
        run: |
          git clone --depth 1 --branch ${{ env.AJANTV2_TAG }} \
            https://github.com/aja-video/libajantv2.git /tmp/libajantv2
          cmake -S /tmp/libajantv2 -B /tmp/libajantv2/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DAJANTV2_DISABLE_DEMOS=ON \
            -DAJANTV2_DISABLE_DRIVER=ON \
            -DAJANTV2_DISABLE_TESTS=ON \
            -DAJANTV2_DISABLE_TOOLS=ON \
            -DAJANTV2_DISABLE_PLUGIN_LOAD=ON
          cmake --build /tmp/libajantv2/build
          sudo cmake --install /tmp/libajantv2/build

      - name: Build libajantv2 (Windows)
        if: matrix.platform == 'windows'
        run: |
          git clone --depth 1 --branch ${{ env.AJANTV2_TAG }} `
            https://github.com/aja-video/libajantv2.git $env:RUNNER_TEMP\libajantv2
          cmake -S $env:RUNNER_TEMP\libajantv2 -B $env:RUNNER_TEMP\libajantv2\build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=$env:RUNNER_TEMP\ajantv2-install `
            -DAJANTV2_DISABLE_DEMOS=ON `
            -DAJANTV2_DISABLE_DRIVER=ON `
            -DAJANTV2_DISABLE_TESTS=ON `
            -DAJANTV2_DISABLE_TOOLS=ON `
            -DAJANTV2_DISABLE_PLUGIN_LOAD=ON
          cmake --build $env:RUNNER_TEMP\libajantv2\build --config Release
          cmake --install $env:RUNNER_TEMP\libajantv2\build --config Release

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel (Unix)
        if: matrix.platform != 'windows'
        run: uv build --wheel

      - name: Build wheel (Windows)
        if: matrix.platform == 'windows'
        env:
          CMAKE_PREFIX_PATH: ${{ runner.temp }}\ajantv2-install
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

      - name: Upload wheel to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl --clobber
