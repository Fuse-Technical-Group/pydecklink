name: ci-macos

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build and import test
        run: |
          uv sync
          uv run python -c "import pydecklink; print('import OK')"

      - name: Stub freshness
        run: |
          diff -u src/pydecklink/_bindings.pyi \
            .venv/lib/python3.*/site-packages/pydecklink/_bindings.pyi \
            || { echo "::error::Committed stub is stale. Run 'uv sync' and copy the generated _bindings.pyi into src/pydecklink/."; exit 1; }

      - name: Mypy
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest tests/ -x --tb=short --noconftest
