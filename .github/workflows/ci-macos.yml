name: ci-macos

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Build and import test
        run: |
          uv sync
          uv run python -c "import pydecklink; print('import OK')"

      - name: Stub freshness
        run: |
          diff -u src/pydecklink/_bindings.pyi \
            .venv/lib/python3.*/site-packages/pydecklink/_bindings.pyi \
            || { echo "::error::Committed stub is stale. Run 'uv sync' and copy the generated _bindings.pyi into src/pydecklink/."; exit 1; }

      - name: Mypy
        run: uv run mypy

      - name: Unit tests with nanobind leak check
        uses: ./.github/actions/pytest-leak-check
