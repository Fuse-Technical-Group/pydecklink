on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      # release-please-action v5.0.0 excludes draft releases when
      # querying GitHub for "the latest release." If a draft is in
      # flight from a prior workflow run that hasn't yet completed
      # wheel-build + publish-promotion, a run started during that
      # window walks back past the draft to the previous non-draft
      # release and opens a spurious next-release PR with everything
      # since (e.g. #168 proposed 0.3.0 with the entire pre-v0.2.0
      # history attached because v0.2.13 was still draft when this
      # workflow's release-please job started).
      #
      # The close-stale step in publish (below) handles the
      # in-same-run case where release-please-action opens the
      # spurious PR during the same run that creates the draft. It
      # does not cover the cross-run case (this run started while
      # *another* run's draft was in flight) because publish only
      # fires when *this* run cut a release. Deferring here closes
      # that cross-run gap by skipping release-please-action when
      # any draft exists; the next push to main (after publish
      # promotes the draft) re-triggers with correct visibility.
      #
      # If a draft persists because publish failed (e.g., wheel-build
      # error), release-please pauses until an operator promotes or
      # deletes the draft. Emergency fixes that need to ship as a new
      # release require resolving the stuck draft first anyway.
      - name: Defer if a draft release is in flight
        id: draft-check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DRAFT_TAGS=$(gh release list \
            --json tagName,isDraft \
            --jq '[.[] | select(.isDraft == true) | .tagName] | join(",")')
          if [ -n "$DRAFT_TAGS" ]; then
            echo "::warning::Deferring release-please: draft release(s) in flight: $DRAFT_TAGS. Next push to main will re-trigger after the draft is promoted or deleted."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.draft-check.outputs.skip != 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-wheels:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/build-wheels.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write

  # The repo enforces immutable releases as a supply-chain hardening
  # step — assets cannot be added once a release is published. Releases
  # are therefore created as drafts (release-please-config.json) and
  # promoted to "published" only after every per-platform wheel has
  # uploaded successfully. If any matrix leg of build-wheels fails,
  # this job is skipped and the release stays as a draft for manual
  # remediation rather than shipping a wheel-incomplete release.
  publish:
    needs: [release-please, build-wheels]
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false

      # Close any release-PR opened by the first release-please-action
      # call. When a release is being cut (this job's gate), the first
      # call computed the next-release PR while its just-created
      # release was still a draft — release-please-action v5.0.0
      # treats drafts as not-released, so it walks back to the previous
      # non-draft release and includes every commit since, often
      # spuriously bumping the version (#136 wanted 0.3.0 with the
      # entire pre-v0.2.6 history attached). Closing the wrong PR
      # here lets the next push to main re-trigger the workflow's
      # first call with correct visibility (the just-cut release is
      # now non-draft) and reopen a correct PR.
      #
      # On normal-day pushes (no release cut), this job is skipped via
      # the `if: needs.release-please.outputs.releases_created` gate,
      # so the first call's release-PR — which is correct in that case
      # — survives untouched.
      #
      # This handles the in-same-run case only. The cross-run case
      # (this run is normal-day, but another run's draft was in
      # flight when release-please-action queried GitHub) is handled
      # by the "Defer if a draft release is in flight" step at the
      # top of the release-please job.
      - name: Close stale next-release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR_NUM=$(gh pr list \
            --head release-please--branches--main \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "${PR_NUM:-}" ]; then
            gh pr close "$PR_NUM" --comment \
              "Auto-closed by release-please.yml: this PR was opened during the same workflow run that just cut the release, when the release was still in draft state. release-please-action v5.0.0 does not count draft releases as released, so the contents of this PR walk back past the just-cut release and are wrong. The next push to main will re-trigger release-please-action with correct visibility and (if there are unreleased commits) reopen a correct PR."
          else
            echo "No open release-please PR to close."
          fi
