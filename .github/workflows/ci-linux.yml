name: ci-linux

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Ruff lint
        run: uv tool run ruff check src/ tests/

      - name: Ruff format
        run: uv tool run ruff format --check src/ tests/

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config

      - uses: astral-sh/setup-uv@v5

      - name: Build and import test
        run: |
          uv sync
          uv run python -c "import pydecklink; print('import OK')"

      - name: Stub freshness
        run: |
          diff -u src/pydecklink/_bindings.pyi \
            .venv/lib/python3.*/site-packages/pydecklink/_bindings.pyi \
            || { echo "::error::Committed stub is stale. Run 'uv sync' and copy the generated _bindings.pyi into src/pydecklink/."; exit 1; }

      - name: Mypy
        run: uv run mypy

      - name: Unit tests
        run: >-
          uv run pytest
          tests/test_pydecklink_import.py
          tests/test_pydecklink_enums.py
          tests/test_pydecklink_device.py
          tests/test_pydecklink_format.py
          tests/test_pydecklink_output.py
          tests/test_pydecklink_input.py
          -x --tb=short --noconftest

  build:
    if: always()
    needs: [lint, compile]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.compile.result }}" != "success" ]]; then
            exit 1
          fi
