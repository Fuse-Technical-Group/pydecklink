name: ci-linux

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install pre-commit
        run: uv tool install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Build and import test
        run: |
          uv sync
          uv run python -c "import pydecklink; print('import OK')"

      - name: Stub freshness
        run: |
          diff -u src/pydecklink/_bindings.pyi \
            .venv/lib/python3.*/site-packages/pydecklink/_bindings.pyi \
            || { echo "::error::Committed stub is stale. Run 'uv sync' and copy the generated _bindings.pyi into src/pydecklink/."; exit 1; }

      - name: Mypy
        run: uv run mypy

      - name: Unit tests
        run: uv run pytest tests/ -x --tb=short --noconftest

  build:
    if: always()
    needs: [lint, compile]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "${{ needs.compile.result }}" != "success" ]]; then
            exit 1
          fi
